name: budget_app
description: Personal finance manager with clean architecture and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.0
  go_router: ^17.0.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.0
  intl: ^0.20.2
  collection: ^1.19.1
  path: ^1.9.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  local_auth: ^3.0.1
  freezed_annotation: ^3.1.0
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^3.0.3
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
